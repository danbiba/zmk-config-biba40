name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: nice_nano_v2
            shield: biba40_left
          - board: nice_nano_v2
            shield: biba40_right

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x

      - name: Install West
        run: |
          pip install west

      - name: Build Firmware
        run: |
          west init -l app
          west update
          west build -s zmk/app -b ${{ matrix.board }} -- -DSHIELD=${{ matrix.shield }}
